<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3260"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E84C1E"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Fundo circular azul escuro -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Arco C (beacon do farol) -->
  <path d="M 38 22 A 22 22 0 1 0 38 78" fill="none" stroke="url(#og)" stroke-width="11" stroke-linecap="round"/>
  <!-- Corpo retangular do farol -->
  <rect x="44" y="36" width="14" height="26" rx="2" fill="url(#og)"/>
  <!-- Onda azul -->
  <path d="M 20 82 Q 35 75 50 82 Q 65 89 80 82" fill="none" stroke="#4A90D9" stroke-width="5" stroke-linecap="round"/>
</svg>